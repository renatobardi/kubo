# docker-compose.yml — Kubo (produção)
# SurrealDB (único datastore, invariante 2) + scheduler da fase 1 + sidecar de
# backup diário. Pin DEFINITIVO (v3.1.5) por evidência do spike M2 — ADR-0005.
# Casado com o SDK surrealdb==2.0.0 (pyproject). Bump do par sobe junto.
#
# Postura de rede (CLAUDE.md §Segurança): SurrealDB NUNCA é exposto fora da rede
# interna do compose — sem `ports:` publicado. Serviços do mesmo compose o
# alcançam por DNS interno (`surrealdb:8000`). Expor à VCN/host é opt-in consciente.
#
# Este compose é o artefato de PRD (OCI). O deploy DEV no LXC do oute-server
# sobrepõe `compose.dev-lxc.yml` (backup em bind no host) via COMPOSE_FILE no
# .env — ver ADR-0011. O apparmor do dockerd é tratado no AMBIENTE (dpkg-divert no
# kubo-test), não no compose, então este arquivo fica idêntico ao de PRD fora do backup.

services:
  surrealdb:
    image: surrealdb/surrealdb:v3.1.5
    restart: unless-stopped
    # A imagem roda como uid 65532 (nonroot), mas o volume nomeado é root:root e o
    # RocksDB precisa criar seu diretório. root evita um init-container de chown.
    # ponytail: root aqui; se quiser nonroot, um init que faça chown 65532 do volume.
    user: root
    command:
      - start
      - --user
      - ${SURREAL_USER:-root}
      - --pass
      - ${SURREAL_PASS:?defina SURREAL_PASS explicitamente (invariante 8)}
      - rocksdb:/data/kubo.db
    volumes:
      - surreal-data:/data
    # Imagem distroless (sem shell): healthcheck em exec form, binário em /surreal.
    # 3.x renomeou o subcomando: `is-ready --endpoint` (era `isready --conn` no 2.x).
    healthcheck:
      test: ["CMD", "/surreal", "is-ready", "--endpoint", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Scheduler da fase 1 (ADR-0010): lê schedules.yaml, roda um worker por cron.
  # BlockingScheduler síncrono; SIGTERM faz shutdown que espera a run em voo — daí
  # o stop_grace_period 60s (o default de 10s mataria a run antes do shutdown limpo).
  kubo-scheduler:
    # ÚNICO serviço que builda a imagem `kubo:latest` (o kubo-api só a consome). Dois
    # `build:` na MESMA tag geram imagens distintas — o compose assa um label por-serviço
    # — e disputam `kubo:latest`, quebrando o guard do deploy (incidente; runbook-deploy.md).
    build:
      context: .
      args:
        KUBO_BUILD_ID: ${KUBO_BUILD_ID:-unknown}
    image: kubo:latest
    restart: unless-stopped
    depends_on:
      surrealdb:
        condition: service_healthy
    stop_grace_period: 60s
    environment:
      # Endpoint interno do compose — NÃO loopback. SURREAL_PASS é fail-fast aqui
      # (`:?` — compose recusa subir sem senha explícita), reforçando o guard do
      # client (kubo/store/client.py) que já barra o default root/root contra host real.
      SURREAL_URL: ws://surrealdb:8000/rpc
      SURREAL_USER: ${SURREAL_USER:-root}
      SURREAL_PASS: ${SURREAL_PASS:?defina SURREAL_PASS explicitamente (invariante 8)}
      SURREAL_NS: ${SURREAL_NS:-kubo}
      SURREAL_DB: ${SURREAL_DB:-kubo}
      # Keys de LLM (M6): substituídas do .env do servidor (invariante 8, nunca
      # literal). SEM `:?` fail-fast — o scheduler sobe para os feed workers que não
      # usam LLM; a ausência só falha quando o backfill/destilação a exige de fato
      # (GeminiEmbedder.from_env / ApiExecutor levantam no uso). GEMINI = embedding
      # (busca/backfill); GROQ = chat do destilador (worker distiller + smoke, M6 8.6).
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      # Anthropic: paga o executor `cli` da persona dev (ADR-0019, fase 3). SEM `:?`
      # fail-fast — o scheduler sobe sem ela (feed/distiller não usam); só o flow
      # dev-mini a exige, e o CliExecutor levanta no uso se ausente. Segredo só do .env
      # do servidor (invariante 8), nunca literal. Usada já no spike 16.2 (scripts.spike_cli).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Sandbox do flow dev (ADR-0019 §X, D37): coordenadas do repo `kubo-forge` (não são
      # segredo) + o PAT fine-grained restrito a esse repo (contents+PR, ESSE sim segredo,
      # invariante 8). O disparo é por CLI aqui: `docker compose run --rm kubo-scheduler
      # python -m kubo flow run dev-mini "<tarefa>"`. SEM `:?` — só o dev-mini exige, e o
      # runtime levanta ConfigError legível no uso se faltar. Setup no runbook §2e.
      GITHUB_PAT_FORGE: ${GITHUB_PAT_FORGE:-}  # pragma: allowlist secret
      KUBO_FORGE_REPO_URL: ${KUBO_FORGE_REPO_URL:-}
      KUBO_FORGE_OWNER: ${KUBO_FORGE_OWNER:-}
      KUBO_FORGE_REPO: ${KUBO_FORGE_REPO:-}
      KUBO_FORGE_GIT_NAME: ${KUBO_FORGE_GIT_NAME:-}
      KUBO_FORGE_GIT_EMAIL: ${KUBO_FORGE_GIT_EMAIL:-}
      # OpenRouter: candidato do PILOTO e modelo do DRENO one-off (ADR-0017, Trilha B da
      # 0014). SEM `:?` fail-fast — o regime diário (Groq/free) nunca usa OpenRouter; só
      # os scripts one-off `distill_pilot`/`drain_distill` a exigem, e falham no uso se
      # ausente. Segredo só do .env do servidor (invariante 8), nunca literal.
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # Distribuição do digest (ADR-0015). SEM `:?` fail-fast — o scheduler sobe para
      # feed/distiller sem o Telegram; a ausência só falha quando o job `digest` roda
      # (destinations/resolve_base_url levantam ConfigError no disparo → scheduler_job_
      # failed, não derruba o processo). TOKEN e CHAT_ID são segredo/PII: só por env do
      # servidor, nunca literal (invariante 8). BASE_URL = link do digest para a UI.
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      KUBO_OWNER_TELEGRAM_CHAT_ID: ${KUBO_OWNER_TELEGRAM_CHAT_ID:-}
      KUBO_BASE_URL: ${KUBO_BASE_URL:-}
      # Timezone explícita: alinha timestamps de log ao horário do schedules.yaml.
      TZ: ${TZ:-America/Sao_Paulo}
    # Sem healthcheck: BlockingScheduler sem porta não tem check honesto; a restart
    # policy é o mecanismo de recuperação e `docker compose logs -f` é a
    # observabilidade da fase 1 (runbook). Log rotation porque o scheduler emite
    # JSON continuamente — sem teto, é o incidente de disco de 6 meses.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # UI da fase 2 (ADR-0014): FastAPI + HTMX servindo Destilados e Painel atrás de
  # login. MESMA imagem do scheduler; só o command muda. O publish NÃO fica aqui
  # (base = PRD/OCI): o overlay compose.dev-lxc.yml publica no IP Tailscale
  # (100.66.254.24:3900, E2); o publish de PRD/OCI é decisão futura (como o backup).
  kubo-api:
    # MESMA imagem do kubo-scheduler (só o `command` muda). NÃO tem `build:` de propósito:
    # o kubo-scheduler é o único builder de `kubo:latest` (evita o race de dois `build:` na
    # mesma tag). `pull_policy: never` = a tag é local, nunca buscada de registry.
    # Env deliberadamente SEM Telegram/LLM-de-escrita: a UI usa Surreal READ-ONLY (least-
    # privilege, ADR-0014 amendment); o analista/report ESCREVE no grafo, então roda do
    # kubo-scheduler (que tem root + os segredos de distribuição), nunca daqui.
    image: kubo:latest
    pull_policy: never
    restart: unless-stopped
    depends_on:
      surrealdb:
        condition: service_healthy
    # Fábrica create_app (fail-fast sem os segredos da UI); 1 worker (um usuário —
    # mais workers = memória + estado escondido). Escuta 0.0.0.0 DENTRO do namespace
    # do container: inofensivo — quem publica a porta é o compose, no IP Tailscale (E2).
    command:
      - uvicorn
      - kubo.api.app:create_app
      - --factory
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --workers
      - "1"
    environment:
      SURREAL_URL: ws://surrealdb:8000/rpc
      # A UI usa o usuário READ-ONLY (ROOT-level VIEWER, ADR-0014 amendment 0010):
      # só GET/leituras, nunca escreve. Credencial DISTINTA da de escrita (scheduler/
      # backup seguem com SURREAL_USER/PASS root). Fail-fast como os outros segredos —
      # a UI NUNCA sobe com credencial de escrita (fail-closed é o ponto da decisão).
      # Criação do viewer = passo one-time do runbook (senha via env/getpass, nunca
      # migration — invariante 8). Signin do viewer é IGUAL ao do root (sem ns/db):
      # nível ROOT evita ramo no caminho strict client.py (sonda 0010).
      SURREAL_USER: ${KUBO_RO_SURREAL_USER:-kubo_ro}
      SURREAL_PASS: ${KUBO_RO_SURREAL_PASS:?defina KUBO_RO_SURREAL_PASS — senha do usuário read-only da UI (runbook); a UI nunca roda com credencial de escrita}
      SURREAL_NS: ${SURREAL_NS:-kubo}
      SURREAL_DB: ${SURREAL_DB:-kubo}
      # Segredos da UI (invariante 8), fail-fast como o SURREAL_PASS. O hash sai do
      # helper `python -m kubo.api.hashpw`; o secret de sessão é um token aleatório.
      KUBO_PASSWORD_HASH: ${KUBO_PASSWORD_HASH:?defina KUBO_PASSWORD_HASH — gere com python -m kubo.api.hashpw}
      SESSION_SECRET: ${SESSION_SECRET:?defina SESSION_SECRET — token aleatório de 32+ bytes}
      # Hosts confiáveis (TrustedHost, anti-DNS-rebinding). Default = IP Tailscale do
      # publish; localhost é sempre permitido no código (healthcheck). Vírgula separa.
      KUBO_ALLOWED_HOSTS: ${KUBO_ALLOWED_HOSTS:-100.66.254.24}
      # Busca: SEM fail-fast (E-f) — a UI sobe sem a key e serve Painel + listas; só a
      # busca degrada (alerta tinted). GEMINI = embedding da busca semântica.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # ── Caminho de ESCRITA da UI (ADR-0018 §I, sessão 0015) ──────────────────
      # Credencial de escrita (kubo_rw, ROOT-level EDITOR), DISTINTA do kubo_ro. SEM
      # `:?` fail-fast: ausente, a UI de leitura segue viva e SÓ os 2 handlers de
      # escrita (aprovar/rejeitar gate, disparar flow) dão 503. Criação = passo
      # one-time do runbook (§2d), senha via env (invariante 8), nunca migration.
      KUBO_RW_SURREAL_PASS: ${KUBO_RW_SURREAL_PASS:-}
      # Custo NOMEADO do write-path (ADR-0018 §I): a kubo-api agora dispara flows e
      # entrega relatórios na aprovação, logo carrega LLM + Telegram + base URL. SEM
      # fail-fast — o disparo/entrega falha no uso (não derruba a UI). GROQ = modelo da
      # analista; GEMINI (acima) = embedding do retrieval.
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      KUBO_OWNER_TELEGRAM_CHAT_ID: ${KUBO_OWNER_TELEGRAM_CHAT_ID:-}
      KUBO_BASE_URL: ${KUBO_BASE_URL:-}
      # Reject do gate dev (ADR-0019 §IX): a UI FECHA o PR via API na rejeição, logo carrega
      # o PAT do forge + as coordenadas do sandbox. Custo de superfície NOMEADO (§X): a
      # kubo-api NÃO roda o executor cli (sem scrub, sem agente) — só a chamada REST de close.
      # SEM `:?` — ausente, o reject dá 503/erro no uso, o resto da UI segue. Setup runbook §2e.
      GITHUB_PAT_FORGE: ${GITHUB_PAT_FORGE:-}  # pragma: allowlist secret
      KUBO_FORGE_REPO_URL: ${KUBO_FORGE_REPO_URL:-}
      KUBO_FORGE_OWNER: ${KUBO_FORGE_OWNER:-}
      KUBO_FORGE_REPO: ${KUBO_FORGE_REPO:-}
      KUBO_FORGE_GIT_NAME: ${KUBO_FORGE_GIT_NAME:-}
      KUBO_FORGE_GIT_EMAIL: ${KUBO_FORGE_GIT_EMAIL:-}
      TZ: ${TZ:-America/Sao_Paulo}
    # Imagem slim não tem curl: healthcheck via python/urllib no /healthz (sem auth,
    # sem banco). localhost é sempre permitido no TrustedHost (append no código).
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz', timeout=3).status == 200 else 1)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # Backup diário. A imagem oficial do SurrealDB é distroless (sem shell/cron),
  # então o dump não roda dentro dela: um sidecar alpine consome o endpoint HTTP
  # de export do SurrealDB (equivalente ao `surreal export` — D2) via busybox wget.
  # Loop de sleep = cron de 1 job/dia. Sem upload externo (D2 emendada): o dump
  # local, encadeado até o host pelo bind /backups, é a cópia fora do container;
  # bucket OCI fica para PRD. Retenção 7d no próprio loop.
  backup:
    image: alpine:3.20
    restart: unless-stopped
    depends_on:
      surrealdb:
        condition: service_healthy
    volumes:
      - surreal-backups:/backups
    environment:
      SURREAL_USER: ${SURREAL_USER:-root}
      SURREAL_PASS: ${SURREAL_PASS:?defina SURREAL_PASS explicitamente (invariante 8)}
      SURREAL_NS: ${SURREAL_NS:-kubo}
      SURREAL_DB: ${SURREAL_DB:-kubo}
    command:
      - sh
      - -c
      - |
        set -u   # sem -e: uma falha transitória de rede não pode matar o loop diário
        # tr -d '\n': o base64 do busybox quebra linha a cada 76 chars — com uma
        # senha longa (32+ aleatória, ADR-0014 amendment) o header Authorization
        # ganharia um \n no meio e o /export responde 400. Achado no deploy 0010.
        AUTH=$$(printf '%s:%s' "$$SURREAL_USER" "$$SURREAL_PASS" | base64 | tr -d '\n')
        while true; do
          TS=$$(date -u +%Y%m%dT%H%M%SZ)
          OUT="/backups/kubo-$$TS.surql"
          if wget -q --timeout=30 --tries=2 -O "$$OUT" \
              --header="Authorization: Basic $$AUTH" \
              --header="surreal-ns: $$SURREAL_NS" \
              --header="surreal-db: $$SURREAL_DB" \
              "http://surrealdb:8000/export"; then
            echo "[backup] dump local: $$OUT ($$(wc -c < "$$OUT") bytes)"
          else
            echo "[backup] export FALHOU (timeout/erro) — nova tentativa no próximo ciclo"
            rm -f "$$OUT"
          fi
          # Retenção: apaga dumps com mais de 7 dias. `find -delete` (nunca rm -rf),
          # escopo estreito no glob kubo-*.surql — não toca mais nada em /backups.
          find /backups -name 'kubo-*.surql' -mtime +7 -delete 2>/dev/null || true
          sleep 86400
        done

volumes:
  surreal-data:
  surreal-backups:
