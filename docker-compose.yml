# docker-compose.yml — Kubo (produção)
# SurrealDB (único datastore, invariante 2) + scheduler da fase 1 + sidecar de
# backup diário. Pin DEFINITIVO (v3.1.5) por evidência do spike M2 — ADR-0005.
# Casado com o SDK surrealdb==2.0.0 (pyproject). Bump do par sobe junto.
#
# Postura de rede (CLAUDE.md §Segurança): SurrealDB NUNCA é exposto fora da rede
# interna do compose — sem `ports:` publicado. Serviços do mesmo compose o
# alcançam por DNS interno (`surrealdb:8000`). Expor à VCN/host é opt-in consciente.
#
# Este compose é o artefato de PRD (OCI). O deploy DEV no LXC do oute-server
# sobrepõe `compose.dev-lxc.yml` (backup em bind no host) via COMPOSE_FILE no
# .env — ver ADR-0011. O apparmor do dockerd é tratado no AMBIENTE (dpkg-divert no
# kubo-test), não no compose, então este arquivo fica idêntico ao de PRD fora do backup.

services:
  surrealdb:
    image: surrealdb/surrealdb:v3.1.5
    restart: unless-stopped
    # A imagem roda como uid 65532 (nonroot), mas o volume nomeado é root:root e o
    # RocksDB precisa criar seu diretório. root evita um init-container de chown.
    # ponytail: root aqui; se quiser nonroot, um init que faça chown 65532 do volume.
    user: root
    command:
      - start
      - --user
      - ${SURREAL_USER:-root}
      - --pass
      - ${SURREAL_PASS:?defina SURREAL_PASS explicitamente (invariante 8)}
      - rocksdb:/data/kubo.db
    volumes:
      - surreal-data:/data
    # Imagem distroless (sem shell): healthcheck em exec form, binário em /surreal.
    # 3.x renomeou o subcomando: `is-ready --endpoint` (era `isready --conn` no 2.x).
    healthcheck:
      test: ["CMD", "/surreal", "is-ready", "--endpoint", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Scheduler da fase 1 (ADR-0010): lê schedules.yaml, roda um worker por cron.
  # BlockingScheduler síncrono; SIGTERM faz shutdown que espera a run em voo — daí
  # o stop_grace_period 60s (o default de 10s mataria a run antes do shutdown limpo).
  kubo-scheduler:
    build: .
    image: kubo:latest
    restart: unless-stopped
    depends_on:
      surrealdb:
        condition: service_healthy
    stop_grace_period: 60s
    environment:
      # Endpoint interno do compose — NÃO loopback. SURREAL_PASS é fail-fast aqui
      # (`:?` — compose recusa subir sem senha explícita), reforçando o guard do
      # client (kubo/store/client.py) que já barra o default root/root contra host real.
      SURREAL_URL: ws://surrealdb:8000/rpc
      SURREAL_USER: ${SURREAL_USER:-root}
      SURREAL_PASS: ${SURREAL_PASS:?defina SURREAL_PASS explicitamente (invariante 8)}
      SURREAL_NS: ${SURREAL_NS:-kubo}
      SURREAL_DB: ${SURREAL_DB:-kubo}
      # Keys de LLM (M6): substituídas do .env do servidor (invariante 8, nunca
      # literal). SEM `:?` fail-fast — o scheduler sobe para os feed workers que não
      # usam LLM; a ausência só falha quando o backfill/destilação a exige de fato
      # (GeminiEmbedder.from_env / ApiExecutor levantam no uso). GEMINI = embedding
      # (busca/backfill); GROQ = chat do destilador (worker distiller + smoke, M6 8.6).
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      # Timezone explícita: alinha timestamps de log ao horário do schedules.yaml.
      TZ: ${TZ:-America/Sao_Paulo}
    # Sem healthcheck: BlockingScheduler sem porta não tem check honesto; a restart
    # policy é o mecanismo de recuperação e `docker compose logs -f` é a
    # observabilidade da fase 1 (runbook). Log rotation porque o scheduler emite
    # JSON continuamente — sem teto, é o incidente de disco de 6 meses.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # Backup diário. A imagem oficial do SurrealDB é distroless (sem shell/cron),
  # então o dump não roda dentro dela: um sidecar alpine consome o endpoint HTTP
  # de export do SurrealDB (equivalente ao `surreal export` — D2) via busybox wget.
  # Loop de sleep = cron de 1 job/dia. Sem upload externo (D2 emendada): o dump
  # local, encadeado até o host pelo bind /backups, é a cópia fora do container;
  # bucket OCI fica para PRD. Retenção 7d no próprio loop.
  backup:
    image: alpine:3.20
    restart: unless-stopped
    depends_on:
      surrealdb:
        condition: service_healthy
    volumes:
      - surreal-backups:/backups
    environment:
      SURREAL_USER: ${SURREAL_USER:-root}
      SURREAL_PASS: ${SURREAL_PASS:?defina SURREAL_PASS explicitamente (invariante 8)}
      SURREAL_NS: ${SURREAL_NS:-kubo}
      SURREAL_DB: ${SURREAL_DB:-kubo}
    command:
      - sh
      - -c
      - |
        set -u   # sem -e: uma falha transitória de rede não pode matar o loop diário
        AUTH=$$(printf '%s:%s' "$$SURREAL_USER" "$$SURREAL_PASS" | base64)
        while true; do
          TS=$$(date -u +%Y%m%dT%H%M%SZ)
          OUT="/backups/kubo-$$TS.surql"
          if wget -q --timeout=30 --tries=2 -O "$$OUT" \
              --header="Authorization: Basic $$AUTH" \
              --header="surreal-ns: $$SURREAL_NS" \
              --header="surreal-db: $$SURREAL_DB" \
              "http://surrealdb:8000/export"; then
            echo "[backup] dump local: $$OUT ($$(wc -c < "$$OUT") bytes)"
          else
            echo "[backup] export FALHOU (timeout/erro) — nova tentativa no próximo ciclo"
            rm -f "$$OUT"
          fi
          # Retenção: apaga dumps com mais de 7 dias. `find -delete` (nunca rm -rf),
          # escopo estreito no glob kubo-*.surql — não toca mais nada em /backups.
          find /backups -name 'kubo-*.surql' -mtime +7 -delete 2>/dev/null || true
          sleep 86400
        done

volumes:
  surreal-data:
  surreal-backups:
