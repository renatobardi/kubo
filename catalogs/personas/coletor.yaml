# Persona coletor — assina tasks mecânicas sem LLM (pipeline v1, sessão 0021, C6).
#
# DESVIO NOMEADO (registrar no ADR-0022): reusa executor=human, mas NÃO é uma pessoa —
# é "sem executor construído". O enum `Executor` (kubo/runtime/personas.py) só tem
# api|cli|human; estender pra um 4º valor seria mudança de schema, e C6 exige "zero
# mudança de schema" pro pipeline v1. `create_task` exige uma persona (todo task tem
# dono no grafo); o `github-releases` não usa NENHUM executor (roda sem LLM), então
# `_build_executor` nunca é chamado pra esta persona — o campo é vestigial aqui.
# Revisitar se um segundo caso mecânico aparecer (aí sim justifica um valor dedicado).
name: coletor
executor: human
permissions: [github-watch]
