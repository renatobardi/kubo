# dev-mini v2 (ADR-0021): `done` deixa de ser terminal — o rito de promoção é um GATE
# DECLARADO (`done → promoted`, spec §3.1.3), não regra hardcoded. Aprovar `review→done`
# abre automaticamente o gate de promoção (a próxima task humana). `promoted` (sem transição
# de saída) é o terminal de sucesso. `rejected` é NOME RESERVADO (aprovar⇔não-rejected).
# Flows v1 legados obedecem o snapshot congelado (invariante 4) — `done` segue terminal neles.
name: dev-mini
version: 2
board:
  states: [created, implementing, review, done, promoted, rejected, failed]
  transitions:
    - [created, implementing]
    - [implementing, review]
    - [implementing, failed]
    - [review, done]
    - [review, rejected]
    - [done, promoted]
  gates:
    - [review, done]
    - [review, rejected]
    - [done, promoted]
cast: [dev, humano]
deliverable: pr
triggers: [manual]
budget_usd: 5.0
