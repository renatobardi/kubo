# schedules.yaml — configuração de agendamento da fase 1 (ADR-0010).
#
# NÃO é um 4º catálogo: catálogos descrevem ARTEFATOS do ateliê (o quê existe);
# schedules descreve OPERAÇÃO (quando roda). Mora na raiz do repo, ao lado do
# docker-compose.yml. Consumido por `python -m kubo.scheduler`.
#
# `timezone` é OBRIGATÓRIO e explícito — o default do APScheduler é a tz do
# processo, que diverge silenciosamente entre dev (Mac) e container (UTC).
# Uma entry = um feed (um run = um feed = source consistente, ADR-0009 item VII).
# NUNCA carrega segredo (invariante 8): feeds são públicos; credencial vem do
# catálogo de integrações + env, nunca daqui.
#
# ATENÇÃO (dono): as 6 URLs abaixo são as fontes reais do plano 0005, com os
# endpoints RSS canônicos conhecidos. Reconciliar com as URLs exatas do legado
# (NeonDB `feed_sources`) antes do deploy — o CI não toca a internet, então uma
# URL errada aqui não quebra teste, só a coleta real.
timezone: America/Sao_Paulo

schedules:
  - worker: feed
    cron: "0 8 * * *"
    config:
      feed_url: https://openai.com/news/rss.xml
      title: OpenAI News
      tags: [ai, openai, confiavel]
  - worker: feed
    cron: "10 8 * * *"
    config:
      feed_url: https://deepmind.google/blog/rss.xml
      title: Google DeepMind Blog
      tags: [ai, deepmind, confiavel]
  - worker: feed
    cron: "20 8 * * *"
    config:
      feed_url: https://huggingface.co/blog/feed.xml
      title: Hugging Face Blog
      tags: [ai, dev, huggingface]
  - worker: feed
    cron: "30 8 * * *"
    config:
      feed_url: https://github.blog/ai-and-ml/feed/
      title: GitHub Blog — AI & ML
      tags: [ai, dev, github]
  - worker: feed
    cron: "40 8 * * *"
    config:
      feed_url: https://importai.substack.com/feed
      title: Import AI
      tags: [ai, newsletter]
  - worker: feed
    cron: "50 8 * * *"
    config:
      feed_url: https://www.semianalysis.com/feed
      title: SemiAnalysis
      tags: [ai, hardware, semianalysis]
  # ── DESTILADOR DIÁRIO — ATIVO (reativado na mini-sessão 0008) ─────────────────
  # Precondição cumprida: o filtro de itens `content=""` está em
  # kubo.store.knowledge.items_without_distilled (link-posts sem corpo nunca vão
  # ao LLM). 09:00 = após a coleta dos feeds (08:00-08:50); ADR-0013 §VIII: itens
  # que chegam depois esperam o dia seguinte, idempotente. `max_items` conservador
  # (20/dia) por ora — o ritmo do backlog é decisão da fase 2.
  - worker: distiller
    cron: "0 9 * * *"
    config:
      max_items: 20
  # ── DIGEST DIÁRIO — 09:30, após a destilação das 09:00 (ADR-0015 D30) ──────────
  # Envia aos destinos do destinations.yaml os destilados novos desde o último
  # envio (por destino, watermark). Dia sem novidade = sem mensagem (só-se-novidade,
  # ADR-0015 §V). A corrida 09:00/09:30 é semântica ACEITA: o watermark garante que
  # nada se perde, só desloca para o dia seguinte o que a destilação ainda não fechou.
  - worker: digest
    cron: "30 9 * * *"
    config:
      max_items: 50
