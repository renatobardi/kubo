# schedules.yaml — configuração de agendamento da fase 1 (ADR-0010).
#
# NÃO é um 4º catálogo: catálogos descrevem ARTEFATOS do ateliê (o quê existe);
# schedules descreve OPERAÇÃO (quando roda). Mora na raiz do repo, ao lado do
# docker-compose.yml. Consumido por `python -m kubo.scheduler`.
#
# `timezone` é OBRIGATÓRIO e explícito — o default do APScheduler é a tz do
# processo, que diverge silenciosamente entre dev (Mac) e container (UTC).
# NUNCA carrega segredo (invariante 8): feeds são públicos; credencial vem do
# catálogo de integrações + env, nunca daqui.
#
# A LISTA de feeds NÃO mora mais aqui (#108, corte RSS do ADR-0025): o banco diz
# O QUÊ coletar (Cadastros ativos), geridos pela UI (#105-#107) e semeados por
# `python -m kubo.store.seed`. Este arquivo é só OPERAÇÃO (quando roda). A coleta
# de feeds virou UM sweep (`sweep: rss`) que varre os Cadastros ativos e dispara
# um run por Cadastro — preserva "um run = um feed" (ADR-0009 item VII).
timezone: America/Sao_Paulo

schedules:
  # ── SWEEP RSS — coleta dirigida por Cadastro (#108, ADR-0025 §4) ──────────────
  # Varre os Cadastros rss ATIVOS (enabled=true, não arquivados) e dispara um run
  # por Cadastro. Pausar/arquivar pela UI de fato para a coleta a partir daqui.
  - sweep: rss
    cron: "0 8 * * *"
  # ── DESTILADOR DIÁRIO — ATIVO (reativado na mini-sessão 0008) ─────────────────
  # Precondição cumprida: o filtro de itens `content=""` está em
  # kubo.store.knowledge.items_without_distilled (link-posts sem corpo nunca vão
  # ao LLM). 09:00 = após a coleta dos feeds (08:00-08:50); ADR-0013 §VIII: itens
  # que chegam depois esperam o dia seguinte, idempotente. `max_items` subiu de
  # 20 para 50 (D56, sessão 0021): o pipeline abaixo soma 7-15 releases/dia ao
  # funil — sem o teto mais folgado, o funil represaria por motivo estrutural,
  # não pelo pipeline em si.
  - worker: distiller
    cron: "0 9 * * *"
    config:
      max_items: 50
  # ── SWEEP github-repo — releases dos Cadastros github-repo (#110, ADR-0025 §5) ──
  # Fora do trem 08:00-09:30 (feeds + destilador + digest) — 07:00, antes de tudo.
  # Varre os Cadastros github-repo ATIVOS e dispara um run por repo (simétrico ao sweep
  # rss). Sem `since` aqui: o piso de estreia é o `created_at` de CADA Cadastro (#110/D2)
  # — repo cadastrado hoje só coleta releases publicadas a partir do cadastro, sem
  # backfill (D52), sem `since` global congelado (a dívida "since PARA SEMPRE" morreu com
  # o corte). Pausar/arquivar pela UI de fato para a coleta a partir daqui.
  - sweep: github-repo
    cron: "0 7 * * *"
