<!-- @dsCard group="Brand" viewport="700x150" name="Wordmark" subtitle="Kubo wordmark with the 智 kanji mark" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
body{margin:0;padding:24px;background:var(--background);font-family:var(--font-sans);display:flex;gap:32px;align-items:center}
.lockup{display:flex;align-items:center;gap:12px}
.mark{display:flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:var(--radius-lg);background:var(--sidebar-primary);color:var(--sidebar-primary-foreground);font-family:'Noto Sans JP',var(--font-sans);font-weight:600;font-size:26px}
.word{font-family:var(--font-heading);font-weight:600;font-size:28px;letter-spacing:-0.025em;color:var(--foreground)}
.kanji{font-family:'Noto Sans JP',var(--font-sans);font-weight:500;font-size:18px;color:var(--muted-foreground)}
.tag{font-size:12px;color:var(--muted-foreground)}
</style></head>
<body>
<div class="lockup">
  <div class="mark">智</div>
  <div style="display:flex;flex-direction:column;line-height:1.1">
    <span class="word">Kubo</span>
    <span class="tag">The art of getting things done</span>
  </div>
</div>
<div class="word" style="font-size:40px">Kubo</div>
</body></html>
