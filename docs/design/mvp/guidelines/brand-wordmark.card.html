<!-- @dsCard group="Brand" viewport="700x150" name="Wordmark" subtitle="Kubo wordmark with the line sakura mark" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
body{margin:0;padding:24px;background:var(--background);font-family:var(--font-sans);display:flex;gap:32px;align-items:center}
.lockup{display:flex;align-items:center;gap:12px}
.word{font-family:var(--font-heading);font-weight:600;font-size:28px;letter-spacing:-0.025em;color:var(--foreground)}
.tag{font-size:12px;color:var(--muted-foreground)}
</style></head>
<body>
<div class="lockup">
  <span><svg width="42" height="42" viewBox="0 0 100 100" fill="none" style="display:block">
    <g fill="var(--sakura-petal)" stroke="var(--sakura-ink)" stroke-width="6" stroke-linejoin="round">
      <path d="M50,50 C38,43 33,27 39,15 C42,8 47,10 50,17 C53,10 58,8 61,15 C67,27 62,43 50,50 Z" transform="rotate(0 50 50)"/>
      <path d="M50,50 C38,43 33,27 39,15 C42,8 47,10 50,17 C53,10 58,8 61,15 C67,27 62,43 50,50 Z" transform="rotate(72 50 50)"/>
      <path d="M50,50 C38,43 33,27 39,15 C42,8 47,10 50,17 C53,10 58,8 61,15 C67,27 62,43 50,50 Z" transform="rotate(144 50 50)"/>
      <path d="M50,50 C38,43 33,27 39,15 C42,8 47,10 50,17 C53,10 58,8 61,15 C67,27 62,43 50,50 Z" transform="rotate(216 50 50)"/>
      <path d="M50,50 C38,43 33,27 39,15 C42,8 47,10 50,17 C53,10 58,8 61,15 C67,27 62,43 50,50 Z" transform="rotate(288 50 50)"/>
    </g>
    <g stroke="var(--sakura-ink)" stroke-width="3.3" stroke-linecap="round">
      <line x1="50" y1="50" x2="50" y2="34" transform="rotate(36 50 50)"/><line x1="50" y1="50" x2="50" y2="34" transform="rotate(108 50 50)"/><line x1="50" y1="50" x2="50" y2="34" transform="rotate(180 50 50)"/><line x1="50" y1="50" x2="50" y2="34" transform="rotate(252 50 50)"/><line x1="50" y1="50" x2="50" y2="34" transform="rotate(324 50 50)"/>
    </g>
    <g fill="var(--sakura-ink)">
      <circle cx="50" cy="33" r="3" transform="rotate(36 50 50)"/><circle cx="50" cy="33" r="3" transform="rotate(108 50 50)"/><circle cx="50" cy="33" r="3" transform="rotate(180 50 50)"/><circle cx="50" cy="33" r="3" transform="rotate(252 50 50)"/><circle cx="50" cy="33" r="3" transform="rotate(324 50 50)"/>
      <circle cx="50" cy="50" r="5.4"/>
    </g>
  </svg></span>
  <div style="display:flex;flex-direction:column;line-height:1.1">
    <span class="word">Kubo</span>
    <span class="tag">The art of getting things done</span>
  </div>
</div>
<div class="word" style="font-size:40px">Kubo</div>
</body></html>
