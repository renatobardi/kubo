<!-- @dsCard group="Kubo App" viewport="1440x900" name="Kubo App" subtitle="Recreation interativa — Home, Conhecimento, Flows, Execuções, Catálogos, Distribuição" -->
<!-- @startingPoint section="Screens" subtitle="App shell do Kubo — ateliê de agentes do dono único" viewport="1440x900" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kubo</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="./data.js"></script>
<style>
  html, body, #root { margin: 0; height: 100%; }
  body { background: var(--background); font-family: var(--font-sans); }
  @keyframes kubo-shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  .kubo-sk { background: linear-gradient(90deg, var(--muted) 25%, color-mix(in oklab, var(--muted) 55%, var(--background)) 37%, var(--muted) 63%); background-size: 200% 100%; animation: kubo-shimmer 1.4s ease-in-out infinite; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="./Shell.jsx"></script>
<script type="text/babel" src="./HomeScreen.jsx"></script>
<script type="text/babel" src="./ConhecimentoScreen.jsx"></script>
<script type="text/babel" src="./FontesScreen.jsx"></script>
<script type="text/babel" src="./FlowsScreen.jsx"></script>
<script type="text/babel" src="./ExecucoesScreen.jsx"></script>
<script type="text/babel" src="./CatalogosScreen.jsx"></script>
<script type="text/babel" src="./DistribuicaoScreen.jsx"></script>
<script type="text/babel" src="./ConfiguracoesScreen.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;
const K = window.KoboDesignSystem_6efae6;

function SignIn({ onSignIn }) {
  const { Card, CardHeader, CardTitle, CardDescription, CardContent, Button, Input, Label } = K;
  return (
    <div style={{ minHeight: '100%', display: 'flex', flexDirection: 'column', background: 'color-mix(in oklab, var(--muted) 40%, transparent)' }}>
      <main style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 16 }}>
        <header style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 32 }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', width: 36, height: 36, borderRadius: 'var(--radius-lg)', background: 'var(--sidebar-primary)', color: 'var(--sidebar-primary-foreground)', fontFamily: "'Noto Sans JP', var(--font-sans)", fontWeight: 600, fontSize: 21 }}>智</div>
          <span style={{ fontFamily: 'var(--font-heading)', fontSize: 24, fontWeight: 600, letterSpacing: '-0.025em', color: 'var(--foreground)' }}>Kubo</span>
        </header>
        <div style={{ width: '100%', maxWidth: 384 }}>
          <LoginCard onDone={onSignIn} />
        </div>
      </main>
      <footer style={{ padding: '0 16px 24px', textAlign: 'center', fontSize: 12, color: 'var(--muted-foreground)' }}>© 2026 Kubo · The art of getting things done</footer>
    </div>
  );
}

function SocialButton({ icon, glyph, label, onClick }) {
  const { Button, Icon } = K;
  return (
    <Button variant="outline" onClick={onClick} style={{ width: '100%', justifyContent: 'center', gap: 8 }}>
      {glyph ? <span style={{ fontWeight: 700, fontSize: 14 }}>{glyph}</span> : <Icon name={icon} size={16} />} {label}
    </Button>
  );
}

function LoginCard({ onDone }) {
  const { Card, CardHeader, CardTitle, CardDescription, CardContent, Button, Input, Label, Icon } = K;
  const [step, setStep] = useState('login'); // login | signup | 2fa
  const [code, setCode] = useState('');
  const back = step === '2fa';
  const title = step === 'signup' ? 'Criar conta' : step === '2fa' ? 'Verificação em duas etapas' : 'Entrar';
  const desc = step === 'signup' ? 'Comece seu ateliê de agentes.' : step === '2fa' ? 'Digite o código do seu app autenticador.' : 'Acesse seu ateliê de agentes.';
  return (
    <Card>
      <CardHeader style={{ paddingBottom: 0 }}>
        <CardTitle style={{ fontSize: 20 }}>{title}</CardTitle>
        <CardDescription style={{ fontSize: 14 }}>{desc}</CardDescription>
      </CardHeader>
      <CardContent>
        {step === '2fa' ? (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              <Label htmlFor="code">Código de 6 dígitos</Label>
              <Input id="code" value={code} onChange={e => setCode(e.target.value.replace(/\D/g, '').slice(0, 6))} inputMode="numeric" placeholder="123456" style={{ letterSpacing: '0.4em', textAlign: 'center', fontFamily: 'ui-monospace, monospace', fontSize: 16 }} />
              <span style={{ fontSize: 12, color: 'var(--muted-foreground)' }}>Ou use um código de backup.</span>
            </div>
            <Button style={{ width: '100%' }} disabled={code.length < 6} onClick={onDone}>Verificar e entrar</Button>
            <button onClick={() => setStep('login')} style={{ border: 'none', background: 'transparent', cursor: 'pointer', fontSize: 13, color: 'var(--muted-foreground)', fontFamily: 'var(--font-sans)' }}>Voltar</button>
          </div>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              <SocialButton icon="git-branch" label="Continuar com GitHub" onClick={() => setStep('2fa')} />
              <SocialButton glyph="G" label="Continuar com Google" onClick={() => setStep('2fa')} />
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <div style={{ flex: 1, height: 1, background: 'var(--border)' }} />
              <span style={{ fontSize: 12, color: 'var(--muted-foreground)' }}>ou com email</span>
              <div style={{ flex: 1, height: 1, background: 'var(--border)' }} />
            </div>
            <form onSubmit={(e) => { e.preventDefault(); setStep('2fa'); }} style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {step === 'signup' && (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                  <Label htmlFor="nm">Nome</Label>
                  <Input id="nm" placeholder="Seu nome" />
                </div>
              )}
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                <Label htmlFor="email">Email</Label>
                <Input id="email" type="email" defaultValue="renato@kubo.studio" placeholder="voce@exemplo.com" />
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                <Label htmlFor="pw">Senha</Label>
                <Input id="pw" type="password" defaultValue="password" placeholder="••••••••" />
              </div>
              <Button type="submit" style={{ width: '100%' }}>{step === 'signup' ? 'Criar conta' : 'Continuar'}</Button>
            </form>
            <p style={{ margin: 0, textAlign: 'center', fontSize: 13, color: 'var(--muted-foreground)' }}>
              {step === 'signup' ? 'Já tem conta? ' : 'Novo por aqui? '}
              <button onClick={() => setStep(step === 'signup' ? 'login' : 'signup')} style={{ border: 'none', background: 'transparent', cursor: 'pointer', fontSize: 13, color: 'var(--primary)', fontWeight: 500, fontFamily: 'var(--font-sans)', padding: 0 }}>
                {step === 'signup' ? 'Entrar' : 'Criar conta'}
              </button>
            </p>
          </div>
        )}
      </CardContent>
    </Card>
  );
}

const GROUP_OF = {
  Conhecimento: 'Conhecimento', Fontes: 'Conhecimento',
  Flows: 'Trabalho', 'Execuções': 'Trabalho',
  Destinos: 'Distribuição', Envios: 'Distribuição',
  'Integrações': 'Catálogos', Personas: 'Catálogos', Templates: 'Catálogos',
};

function SkeletonBlock({ w = '100%', h = 16, r = 'var(--radius-md)' }) {
  return <div className="kubo-sk" style={{ width: w, height: h, borderRadius: r }} />;
}
function SkeletonScreen() {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 24, padding: 24 }}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        <SkeletonBlock w={200} h={24} />
        <SkeletonBlock w={340} h={14} />
        <div style={{ height: 1, background: 'var(--border)', marginTop: 6 }} />
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12 }}>
        {[0, 1, 2, 3].map(i => <SkeletonBlock key={i} h={68} r="var(--radius-2xl)" />)}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
        {[0, 1].map(i => <SkeletonBlock key={i} h={220} r="var(--radius-2xl)" />)}
      </div>
    </div>
  );
}
function LazyScreen({ children }) {
  const [ready, setReady] = useState(false);
  useEffect(() => { const t = setTimeout(() => setReady(true), 340); return () => clearTimeout(t); }, []);
  return ready ? children : <SkeletonScreen />;
}
function LoginModal({ onClose, onDone }) {
  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 100, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16 }}>
      <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'color-mix(in oklab, black 45%, transparent)' }} />
      <div style={{ position: 'relative', width: '100%', maxWidth: 384 }}>
        <LoginCard onDone={onDone} />
      </div>
    </div>
  );
}

// ⌘K command palette
function CommandPalette({ onClose, onNavigate, onToggleTheme }) {
  const { Icon } = K;
  const commands = [
    { group: 'Ir para', icon: 'house', label: 'Home', run: () => onNavigate('Home') },
    { group: 'Ir para', icon: 'book-open', label: 'Conhecimento', run: () => onNavigate('Conhecimento') },
    { group: 'Ir para', icon: 'rss', label: 'Fontes', run: () => onNavigate('Fontes') },
    { group: 'Ir para', icon: 'workflow', label: 'Flows', run: () => onNavigate('Flows') },
    { group: 'Ir para', icon: 'activity', label: 'Execuções', run: () => onNavigate('Execuções') },
    { group: 'Ir para', icon: 'send', label: 'Destinos', run: () => onNavigate('Destinos') },
    { group: 'Ir para', icon: 'mail', label: 'Envios', run: () => onNavigate('Envios') },
    { group: 'Ir para', icon: 'blocks', label: 'Integrações', run: () => onNavigate('Integrações') },
    { group: 'Ir para', icon: 'bot', label: 'Personas', run: () => onNavigate('Personas') },
    { group: 'Ir para', icon: 'workflow', label: 'Templates', run: () => onNavigate('Templates') },
    { group: 'Ir para', icon: 'settings', label: 'Configurações', run: () => onNavigate('Configurações') },
    { group: 'Ações', icon: 'plus', label: 'Novo flow', run: () => onNavigate('Flows') },
    { group: 'Ações', icon: 'search', label: 'Buscar destilados', run: () => onNavigate('Conhecimento') },
    { group: 'Ações', icon: 'moon', label: 'Alternar tema', run: () => onToggleTheme() },
  ];
  const [q, setQ] = useState('');
  const [active, setActive] = useState(0);
  const inputRef = React.useRef(null);
  React.useEffect(() => { if (inputRef.current) inputRef.current.focus(); }, []);
  const filtered = commands.filter(c => c.label.toLowerCase().includes(q.trim().toLowerCase()));
  React.useEffect(() => { setActive(0); }, [q]);
  const choose = (c) => { if (!c) return; c.run(); onClose(); };
  const onKey = (e) => {
    if (e.key === 'ArrowDown') { e.preventDefault(); setActive(a => Math.min(a + 1, filtered.length - 1)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setActive(a => Math.max(a - 1, 0)); }
    else if (e.key === 'Enter') { e.preventDefault(); choose(filtered[active]); }
    else if (e.key === 'Escape') { e.preventDefault(); onClose(); }
  };
  let lastGroup = null;
  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 120, display: 'flex', alignItems: 'flex-start', justifyContent: 'center', padding: '96px 16px 16px' }}>
      <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'color-mix(in oklab, black 40%, transparent)' }} />
      <div style={{ position: 'relative', width: '100%', maxWidth: 560, background: 'var(--popover)', color: 'var(--popover-foreground)', borderRadius: 'var(--radius-2xl)', boxShadow: '0 24px 64px rgba(0,0,0,0.28), 0 0 0 1px color-mix(in oklab, var(--foreground) 6%, transparent)', overflow: 'hidden' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '14px 16px', borderBottom: '1px solid var(--border)' }}>
          <Icon name="search" size={16} style={{ color: 'var(--muted-foreground)' }} />
          <input ref={inputRef} value={q} onChange={e => setQ(e.target.value)} onKeyDown={onKey} placeholder="Buscar telas e ações…"
            style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', fontFamily: 'var(--font-sans)', fontSize: 15, color: 'var(--foreground)' }} />
          <span style={{ fontSize: 11, color: 'var(--muted-foreground)', border: '1px solid var(--border)', borderRadius: 6, padding: '2px 6px' }}>esc</span>
        </div>
        <div style={{ maxHeight: 340, overflowY: 'auto', padding: 6 }}>
          {filtered.length === 0 && <div style={{ padding: '20px 12px', textAlign: 'center', fontSize: 13, color: 'var(--muted-foreground)' }}>Nada encontrado.</div>}
          {filtered.map((c, i) => {
            const showGroup = c.group !== lastGroup; lastGroup = c.group;
            return (
              <React.Fragment key={c.label}>
                {showGroup && <div style={{ padding: '10px 10px 4px', fontSize: 11, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.04em', color: 'var(--muted-foreground)' }}>{c.group}</div>}
                <button onMouseEnter={() => setActive(i)} onClick={() => choose(c)}
                  style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 10, padding: '9px 10px', border: 'none', cursor: 'pointer', borderRadius: 'var(--radius-lg)', background: i === active ? 'var(--accent)' : 'transparent', color: 'var(--foreground)', fontFamily: 'var(--font-sans)', fontSize: 14, textAlign: 'left' }}>
                  <Icon name={c.icon} size={16} style={{ color: 'var(--muted-foreground)' }} />
                  <span style={{ flex: 1 }}>{c.label}</span>
                  {i === active && <Icon name="corner-down-left" size={14} style={{ color: 'var(--muted-foreground)' }} />}
                </button>
              </React.Fragment>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [authed, setAuthed] = useState(false);
  const [showLogin, setShowLogin] = useState(false);
  const [showCmd, setShowCmd] = useState(false);
  const [page, setPage] = useState('Home');
  const [dark, setDark] = useState(false);

  React.useEffect(() => {
    document.documentElement.classList.toggle('dark', dark);
  }, [dark]);

  React.useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K')) {
        e.preventDefault();
        if (authed) setShowCmd(v => !v);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [authed]);

  const group = GROUP_OF[page];
  const bc = page === 'Home' ? [{ label: 'Home' }]
    : group && group !== page ? [{ label: group }, { label: page }]
    : [{ label: page }];

  let screen;
  if (page === 'Home') screen = <HomeScreen onNavigate={setPage} />;
  else if (page === 'Conhecimento') screen = <ConhecimentoScreen />;
  else if (page === 'Fontes') screen = <FontesScreen />;
  else if (page === 'Flows') screen = <FlowsScreen />;
  else if (page === 'Execuções') screen = <ExecucoesScreen />;
  else if (page === 'Destinos') screen = <DestinosScreen />;
  else if (page === 'Envios') screen = <EnviosScreen />;
  else if (page === 'Integrações' || page === 'Personas' || page === 'Templates') screen = <CatalogosScreen section={page} />;
  else if (page === 'Configurações') screen = <ConfiguracoesScreen dark={dark} onToggleDark={setDark} />;
  else screen = <HomeScreen onNavigate={setPage} />;

  return (
    <>
      <Shell page={authed ? page : null} breadcrumb={authed ? bc : [{ label: 'Kubo' }]}
        onNavigate={authed ? setPage : () => {}} dark={dark} onToggleDark={setDark}
        authed={authed} onLoginClick={() => setShowLogin(true)} onOpenCmd={() => setShowCmd(true)}>
        {authed ? <LazyScreen key={page}>{screen}</LazyScreen> : null}
      </Shell>
      {showLogin && <LoginModal onClose={() => setShowLogin(false)} onDone={() => { setShowLogin(false); setAuthed(true); }} />}
      {showCmd && authed && <CommandPalette onClose={() => setShowCmd(false)} onNavigate={(p) => { setPage(p); setShowCmd(false); }} onToggleTheme={() => setDark(v => !v)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
