<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="styles.css">
<style>
  html,body{margin:0;padding:0}
  .tile{width:1280px;height:854px;display:flex;font-family:'Inter',system-ui,sans-serif}
  .main{flex:1;background:#1c1917;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:40px}
  .mark{width:340px;height:340px}
  .word{color:#f4f4f0;font-size:140px;font-weight:600;letter-spacing:-0.03em;line-height:1}
  .strip{width:320px;display:flex;flex-direction:column}
  .strip>div{flex:1}
</style>
</head>
<body>
<div class="tile">
  <div class="main">
    <svg class="mark" viewBox="0 0 100 100" fill="none">
      <g fill="none" stroke="#f4c9d4" stroke-width="6" stroke-linejoin="round">
        <path d="M50,50 C38,43 33,27 39,15 C42,8 47,10 50,17 C53,10 58,8 61,15 C67,27 62,43 50,50 Z" transform="rotate(0 50 50)"></path>
        <path d="M50,50 C38,43 33,27 39,15 C42,8 47,10 50,17 C53,10 58,8 61,15 C67,27 62,43 50,50 Z" transform="rotate(72 50 50)"></path>
        <path d="M50,50 C38,43 33,27 39,15 C42,8 47,10 50,17 C53,10 58,8 61,15 C67,27 62,43 50,50 Z" transform="rotate(144 50 50)"></path>
        <path d="M50,50 C38,43 33,27 39,15 C42,8 47,10 50,17 C53,10 58,8 61,15 C67,27 62,43 50,50 Z" transform="rotate(216 50 50)"></path>
        <path d="M50,50 C38,43 33,27 39,15 C42,8 47,10 50,17 C53,10 58,8 61,15 C67,27 62,43 50,50 Z" transform="rotate(288 50 50)"></path>
      </g>
      <g stroke="#f4c9d4" stroke-width="3.3" stroke-linecap="round">
        <line x1="50" y1="50" x2="50" y2="34" transform="rotate(36 50 50)"></line>
        <line x1="50" y1="50" x2="50" y2="34" transform="rotate(108 50 50)"></line>
        <line x1="50" y1="50" x2="50" y2="34" transform="rotate(180 50 50)"></line>
        <line x1="50" y1="50" x2="50" y2="34" transform="rotate(252 50 50)"></line>
        <line x1="50" y1="50" x2="50" y2="34" transform="rotate(324 50 50)"></line>
      </g>
      <g fill="#f4c9d4">
        <circle cx="50" cy="33" r="3" transform="rotate(36 50 50)"></circle>
        <circle cx="50" cy="33" r="3" transform="rotate(108 50 50)"></circle>
        <circle cx="50" cy="33" r="3" transform="rotate(180 50 50)"></circle>
        <circle cx="50" cy="33" r="3" transform="rotate(252 50 50)"></circle>
        <circle cx="50" cy="33" r="3" transform="rotate(324 50 50)"></circle>
        <circle cx="50" cy="50" r="5.4"></circle>
      </g>
    </svg>
    <div class="word">Kubo</div>
  </div>
  <div class="strip">
    <div style="background:#f4c9d4"></div>
    <div style="background:#e08a9e"></div>
    <div style="background:#c0392b"></div>
    <div style="background:#57534e"></div>
  </div>
</div>
</body>
</html>
