<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
body{margin:0;padding:20px;background:var(--background);font-family:var(--font-sans)}
.row{display:flex;gap:12px;align-items:flex-end}
.bar{background:var(--primary);border-radius:3px;width:40px}
.name{font-size:10px;color:var(--muted-foreground);text-align:center;margin-top:6px}
</style></head>
<body>
<div class="row">
  <div><div class="bar" style="height:4px"></div><div class="name">1<br>4px</div></div>
  <div><div class="bar" style="height:8px"></div><div class="name">2<br>8px</div></div>
  <div><div class="bar" style="height:12px"></div><div class="name">3<br>12px</div></div>
  <div><div class="bar" style="height:16px"></div><div class="name">4<br>16px</div></div>
  <div><div class="bar" style="height:24px"></div><div class="name">6<br>24px · shell</div></div>
  <div><div class="bar" style="height:48px"></div><div class="name">12<br>48px</div></div>
  <div><div class="bar" style="height:72px"></div><div class="name">18<br>72px · header</div></div>
</div>
</body></html>
