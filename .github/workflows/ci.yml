# CI do Kubo — os mesmos gates do harness local, como verdade final no PR.
name: ci

on:
  pull_request:
    branches: [main]
    # `edited` re-executa a validação quando o título muda pós-abertura (senão o
    # check de título de PR fica verde e obsoleto). Custo: re-roda quality/tests
    # no rename — tolerável, `concurrency` cancela runs obsoletos.
    types: [opened, edited, synchronize, reopened]
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"   # auditoria semanal de dependências

# Least-privilege por job (SonarCloud S8264): sem permissões default no nível do
# workflow; cada job declara só o que usa. quality/tests leem o repo (checkout),
# pr-conventions não faz checkout e não precisa de nada.

# Cancela runs obsoletos do mesmo ref (economia + feedback rápido).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Convenções de fluxo Git (ADR-0004): nome de branch na taxonomia + título de PR
  # convencional. Job inteiro só existe em pull_request — em push/schedule o contexto
  # de PR não existe e o branch é main (a guarda evita falso-negativo). O título é
  # INPUT HOSTIL: passa por env e é lido como "$PR_TITLE", nunca interpolado no script.
  pr-conventions:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions: {}          # não faz checkout — nenhuma permissão necessária
    steps:
      - name: Nome do branch na taxonomia
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          echo "branch: $BRANCH"
          echo "$BRANCH" | grep -Eq '^(feat|fix|chore|docs|test|refactor|ci)/[a-z0-9-]+$' \
            || { echo "::error::branch '$BRANCH' fora da taxonomia (feat|fix|chore|docs|test|refactor|ci)/slug (kebab-case)"; exit 1; }
      - name: Título de PR convencional
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "title: $PR_TITLE"
          echo "$PR_TITLE" | grep -Eq '^(feat|fix|chore|docs|test|refactor|ci)(\([a-z0-9._-]+\))?!?: .+' \
            || { echo "::error::título de PR não-convencional: '$PR_TITLE' (ex.: 'feat: add X')"; exit 1; }

  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen            # lockfile íntegro ou falha
      - name: Lint (inclui regras de segurança S/bandit)
        run: uv run ruff check . && uv run ruff format --check .
      - name: Types
        run: uv run pyright
      - name: Segredos
        # Forma ENFORÇANTE: `detect-secrets scan --baseline` sai 0 mesmo com segredo
        # novo (ele reconcilia o baseline). Quem FALHA (exit 1) diante de segredo novo
        # é o `detect-secrets-hook`. Comprovado empiricamente na sessão 0001.
        run: uv run detect-secrets-hook --baseline .secrets.baseline $(git ls-files)
      - name: Auditoria de dependências
        run: uv run pip-audit

  tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      # Gate de cobertura CONFIGURADO mas ADIADO: com módulos ainda quase vazios os
      # dados são ralos (--cov-fail-under falharia/passaria vacuamente). ENFORCE a
      # partir do M3. NUNCA remover o gate — apenas manter `--cov-fail-under` comentado.
      - name: Unit (integração roda no job `integration`)
        run: >
          uv run pytest -m "not integration"
          --cov=kubo/store --cov=kubo/contracts --cov=kubo/runtime
        # enforce a partir do M3:  --cov-fail-under=85

  # Integração religada no M2 (spike SurrealDB). A imagem oficial é distroless (sem
  # shell), então o probe NÃO usa `surreal isready` no runner — usa `curl` no health
  # endpoint em retry loop (corrigido do plano M1). Backend `memory`: efêmero, sem
  # volume, sem problema de permissão. Pin do servidor casado com o SDK (ADR-0005).
  integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - name: Sobe SurrealDB (mesmo comando do spike local)
        run: |
          docker run -d --name surreal -p 127.0.0.1:8000:8000 \
            surrealdb/surrealdb:v3.1.5 start --user root --pass root memory
      - name: Aguarda health (curl retry loop, sem surreal isready)
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health && { echo "health OK ($i)"; exit 0; }
            sleep 1
          done
          echo "::error::SurrealDB não respondeu ao /health"; docker logs surreal; exit 1
      - name: Testes de integração
        run: uv run pytest -m integration
