# CI do Kubo — os mesmos gates do harness local, como verdade final no PR.
name: ci

on:
  pull_request:
    branches: [main]
    # `edited` re-executa a validação quando o título muda pós-abertura (senão o
    # check de título de PR fica verde e obsoleto). Custo: re-roda quality/tests
    # no rename — tolerável, `concurrency` cancela runs obsoletos.
    types: [opened, edited, synchronize, reopened]
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"   # auditoria semanal de dependências

# Least-privilege por job (SonarCloud S8264): sem permissões default no nível do
# workflow; cada job declara só o que usa. quality/tests leem o repo (checkout),
# pr-conventions não faz checkout e não precisa de nada.

# Cancela runs obsoletos do mesmo ref (economia + feedback rápido).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Convenções de fluxo Git (ADR-0004): nome de branch na taxonomia + título de PR
  # convencional. Job inteiro só existe em pull_request — em push/schedule o contexto
  # de PR não existe e o branch é main (a guarda evita falso-negativo). O título é
  # INPUT HOSTIL: passa por env e é lido como "$PR_TITLE", nunca interpolado no script.
  pr-conventions:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions: {}          # não faz checkout — nenhuma permissão necessária
    steps:
      - name: Nome do branch na taxonomia
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          echo "branch: $BRANCH"
          # `agent/<flowid>` (ADR-0021 §9, E1/E3) é a SEGUNDA taxonomia válida — PRs do
          # flow dev-kubo, branch derivado do RecordID do flow (minúsculo alfanumérico
          # SurrealDB), nunca escolhido pelo agente (ver kubo/runtime/flow_runner.py
          # `_dev_branch`). Sem esta alternativa, todo PR de agente reprovaria aqui e
          # NUNCA passaria CI — o gate ficaria impossível de satisfazer, não só rígido.
          echo "$BRANCH" | grep -Eq '^(feat|fix|chore|docs|test|refactor|ci)/[a-z0-9-]+$|^agent/[a-z0-9]+$' \
            || { echo "::error::branch '$BRANCH' fora da taxonomia (feat|fix|chore|docs|test|refactor|ci)/slug ou agent/<flowid>"; exit 1; }
      - name: Título de PR convencional
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "title: $PR_TITLE"
          echo "$PR_TITLE" | grep -Eq '^(feat|fix|chore|docs|test|refactor|ci)(\([a-z0-9._-]+\))?!?: .+' \
            || { echo "::error::título de PR não-convencional: '$PR_TITLE' (ex.: 'feat: add X')"; exit 1; }

  # Path-guard do flow dev-kubo (ADR-0021 §9, E3) — a proteção ESTRUTURAL que substitui o
  # require-review perdido (D45 revertida: o agente usa o PAT DO DONO, sem conta-máquina,
  # `required_approving_review_count: 0` na proteção do branch). PR de agente é identificado
  # por PREFIXO DE BRANCH (`agent/*`, nunca `github.actor` — o autor é sempre o dono). Diff
  # tem que caber no allowlist de worker; fora dele, bloqueado por required status check.
  #
  # Lógica 100% INLINE aqui, nunca um script do repo (mesmo um dentro do allowlist) — defesa
  # em profundidade além do E2 (o PAT de escrita do agente NÃO tem a permissão Workflows; o
  # GitHub REJEITA qualquer push que toque .github/workflows/, então este arquivo já é
  # inatingível pelo PAT por construção — mas a lógica fica inline mesmo assim, para não
  # depender de nenhum caminho de arquivo estar correto).
  #
  # A condição de branch fica DENTRO do step, nunca no `if:` do job: um required status check
  # cujo JOB é pulado via `if:` fica "pending" pra sempre em PRs onde a condição é falsa — o
  # GitHub não trata job-level skip como "passou" (gotcha conhecido). Como job required, isso
  # travaria TODO PR humano (branch fora de `agent/*`) pra sempre. O job sempre RODA em
  # pull_request; só a ENFORCEMENT é condicional (sai 0 cedo quando não é branch de agente).
  agent-path-guard:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # precisa do histórico completo pra `git diff` entre base e head SHA
      - name: Diff contido no allowlist de worker (só PRs de branch agent/*)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BRANCH: ${{ github.head_ref }}
        run: |
          case "$BRANCH" in
            agent/*) ;;
            *) echo "branch '$BRANCH' não é agent/* — path-guard não se aplica"; exit 0 ;;
          esac
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" > /tmp/changed.txt
          echo "arquivos alterados:"; cat /tmp/changed.txt
          if [ ! -s /tmp/changed.txt ]; then
            echo "::error::PR de branch agent/* sem arquivos alterados — nada para validar"
            exit 1
          fi
          # Allowlist (E9/E3): worker novo = kubo/workers/x.py + linha no registry + testes +
          # opcionalmente um YAML de integração/config em catalogs/. Nada fora disso.
          outside=$(grep -Ev '^(kubo/workers/|tests/workers/|catalogs/)' /tmp/changed.txt || true)
          if [ -n "$outside" ]; then
            echo "::error::PR de branch agent/* tocou arquivo(s) fora do allowlist (kubo/workers/**, tests/workers/**, catalogs/**):"
            echo "$outside"
            exit 1
          fi
          echo "ok: diff inteiro contido no allowlist"

  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen            # lockfile íntegro ou falha
      - name: Lint (inclui regras de segurança S/bandit)
        run: uv run ruff check . && uv run ruff format --check .
      - name: Types
        run: uv run pyright
      - name: Segredos
        # Forma ENFORÇANTE: `detect-secrets scan --baseline` sai 0 mesmo com segredo
        # novo (ele reconcilia o baseline). Quem FALHA (exit 1) diante de segredo novo
        # é o `detect-secrets-hook`. Comprovado empiricamente na sessão 0001.
        run: uv run detect-secrets-hook --baseline .secrets.baseline $(git ls-files)
      - name: Auditoria de dependências
        run: uv run pip-audit

  tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      # Feedback rápido: só unit, SEM medir cobertura. O gate de 85% vive no job
      # `integration` (M3), medido sobre a suíte COMPLETA — a store só é exercível
      # contra banco real, e medir cobertura só com unit induziria mock-que-testa-mock.
      - name: Unit (rápido; cobertura é gateada no job `integration`)
        run: uv run pytest -m "not integration"

  # Integração religada no M2 (spike SurrealDB). A imagem oficial é distroless (sem
  # shell), então o probe NÃO usa `surreal isready` no runner — usa `curl` no health
  # endpoint em retry loop (corrigido do plano M1). Backend `memory`: efêmero, sem
  # volume, sem problema de permissão. Pin do servidor casado com o SDK (ADR-0005).
  integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --frozen
      - name: Sobe SurrealDB (mesmo comando do spike local)
        run: |
          docker run -d --name surreal -p 127.0.0.1:8000:8000 \
            surrealdb/surrealdb:v3.1.5 start --user root --pass root memory
      - name: Aguarda health (curl retry loop, sem surreal isready)
        run: |
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health && { echo "health OK ($i)"; exit 0; }
            sleep 1
          done
          echo "::error::SurrealDB não respondeu ao /health"; docker logs surreal; exit 1
      # Gate de cobertura (M3): roda a suíte COMPLETA (unit + integração) com o
      # SurrealDB real de pé e mede cobertura sobre os caminhos críticos. 85% é
      # ALARME, não meta (CLAUDE.md) — testa-se comportamento, não linhas. Marque
      # este job como required na proteção de branch para o gate ter dente.
      - name: Suíte completa + cobertura (gate 85%)
        run: >
          uv run pytest
          --cov=kubo/store --cov=kubo/contracts --cov=kubo/runtime
          --cov-fail-under=85
